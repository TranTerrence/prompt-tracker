<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prompt Tracker</title>
  <link rel="stylesheet" href="../onboarding/onboarding.css" />
  <style>
    /* Spécifique au consentement : cartes à interrupteur, zone socle, danger. */
    .baseline {
      display: flex; gap: 12px; align-items: baseline;
      background: var(--soft); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px 16px; margin-bottom: 24px; color: var(--muted); font-size: 14px;
    }
    .baseline .dot { color: var(--accent); font-weight: 700; }
    .consent-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 18px 20px; margin-bottom: 14px;
    }
    .consent-row { display: flex; align-items: flex-start; gap: 14px; }
    .consent-row .texts { flex: 1; }
    .consent-title { font: 600 16px "Fraunces", Georgia, serif; }
    .consent-desc { color: var(--muted); font-size: 13.5px; margin-top: 3px; }
    .purpose {
      margin-top: 10px; padding: 9px 12px; border-left: 3px solid var(--accent);
      background: var(--soft); border-radius: 0 10px 10px 0; font-size: 13px; color: var(--muted);
    }
    .purpose b { color: var(--ink); font-weight: 600; }
    .switch { position: relative; flex: none; width: 46px; height: 26px; margin-top: 2px; }
    .switch input { opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; position: absolute; z-index: 1; }
    .switch .track {
      position: absolute; inset: 0; border-radius: 999px; background: var(--soft);
      border: 1px solid var(--border); transition: background .2s, border-color .2s;
    }
    .switch .track::after {
      content: ""; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;
      border-radius: 50%; background: var(--surface); border: 1px solid var(--border);
      transition: transform .2s;
    }
    .switch input:checked + .track { background: var(--accent); border-color: var(--accent); }
    .switch input:checked + .track::after { transform: translateX(20px); }
    .actions { margin-top: 26px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .save {
      padding: 12px 22px; border-radius: 12px; border: 1px solid var(--accent);
      background: var(--accent); color: #fdfcf9; font: 600 14px "IBM Plex Sans", sans-serif; cursor: pointer;
    }
    .save:hover { filter: brightness(1.08); }
    .saved { color: var(--accent); font-weight: 600; font-size: 14px; }
    .danger-zone { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
    .purge {
      padding: 9px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: none; color: var(--muted); font: 13px "IBM Plex Sans", sans-serif; cursor: pointer;
    }
    .purge:hover { color: #a4463c; border-color: #a4463c; }
    .status { margin-top: 10px; font-size: 13px; color: var(--muted); }
    .empty-state { text-align: center; color: var(--muted); padding: 24px 0; }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="mark">▷|</div>
      <h1 id="c-title"></h1>
      <p class="subtitle" id="c-subtitle"></p>
    </header>

    <div class="baseline"><span class="dot">●</span><span id="c-baseline"></span></div>

    <div id="c-cards"></div>
    <p id="c-none" class="empty-state" hidden></p>
    <p id="c-disconnected" class="empty-state" hidden></p>

    <div class="actions">
      <button class="save" id="c-save"></button>
      <span class="saved" id="c-saved" hidden></span>
    </div>

    <div class="danger-zone">
      <h2 id="c-danger-title"></h2>
      <button class="purge" id="c-purge"></button>
      <p class="status" id="c-status" hidden></p>
    </div>
  </main>

  <script src="../src/i18n.js"></script>
  <script src="../src/supabase.js"></script>
  <script src="consent.js"></script>
</body>
</html>
