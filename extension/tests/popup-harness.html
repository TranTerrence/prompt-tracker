<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Harnais popup (dev)</title>
</head>
<body>
  <script>
    // Stub chrome.* + jeu de données de démo (Léa, étudiante, 3 semaines).
    // La courbe raconte l'apprentissage : premiers jets faibles puis au niveau.
    (function () {
      const now = Date.now();
      const day = 864e5;
      const split = (total) => {
        const clarte = Math.min(25, Math.round(total * 0.38));
        const contexte = Math.min(25, Math.round(total * 0.3));
        const critique = Math.min(25, Math.max(0, total - clarte - contexte));
        return { clarte, contexte, iteration: 0, critique, total };
      };
      const cats = ["rédaction", "analyse", "recherche", "résumé", "code"];
      const events = [];
      let i = 0;
      const push = (d, opts) => {
        events.push(Object.assign({
          id: "demo-" + i,
          ts: new Date(now - d * day - ((i * 7) % 10) * 36e5).toISOString(),
          site: ["chatgpt", "claude", "gemini"][i % 3],
          category: cats[i % cats.length],
          words: 18 + (i % 25),
          intercepted: false,
          outcome: "sent",
          scoreBefore: null,
          scoreAfter: null,
          mirrorShown: false,
          mirrorFeedback: null,
          rounds: 0,
          answersCount: 0,
          synced: true,
        }, opts));
        i++;
      };
      // Semaine 1 : premiers jets faibles, beaucoup d'interceptions améliorées
      for (const [d, before, after] of [[20, 18, 58], [19, 24, 61], [18, 22, 55], [17, 29, 64], [16, 26, 60], [15, 31, 57]]) {
        push(d, { intercepted: true, outcome: "improved", scoreBefore: before, scoreAfter: after,
          scores: split(after), mirrorShown: true, rounds: 3, answersCount: 2 });
      }
      // Semaine 2 : transition
      for (const [d, before, after] of [[13, 33, 62], [12, 36, 66], [10, 38, 63]]) {
        push(d, { intercepted: true, outcome: "improved", scoreBefore: before, scoreAfter: after,
          scores: split(after), mirrorShown: true, rounds: 2, answersCount: 2 });
      }
      for (const [d, t] of [[13, 41], [11, 38], [9, 44], [8, 46]]) push(d, { scores: split(t) });
      // Semaine 3 : les premiers jets tiennent le seuil : la série se construit
      for (const [d, t] of [[6, 47], [6, 44], [5, 52], [4, 49], [3, 55], [2, 51], [1, 58], [0, 54], [0, 61]]) {
        push(d, { scores: split(t) });
      }
      push(2, { intercepted: true, outcome: "improved", scoreBefore: 42, scoreAfter: 68,
        scores: split(68), mirrorShown: true, rounds: 2, answersCount: 2 });

      const store = {
        settings: { theme: "light", threshold: 40, interceptEnabled: true, captureMode: "metadata", profile: "student" },
        events,
      };
      window.chrome = {
        storage: {
          local: {
            get(keys, cb) {
              const out = {};
              for (const k of Array.isArray(keys) ? keys : [keys]) if (k in store) out[k] = store[k];
              cb(out);
            },
            set(obj, cb) { Object.assign(store, obj); cb && cb(); },
            remove(_k, cb) { cb && cb(); },
          },
          onChanged: { addListener() {} },
        },
        runtime: { sendMessage(_m, cb) { cb && cb({ ok: false }); }, getURL: (p) => p, lastError: null },
        tabs: { create() {} },
        i18n: { getUILanguage: () => "fr" },
      };
    })();
  </script>
  <script>
    // Charge le vrai popup avec ses chemins relatifs, présenté en carte centrée.
    fetch("../popup/popup.html")
      .then((r) => r.text())
      .then((html) => {
        html = html
          .replace("<head>", "<head><base href='../popup/'>")
          .replace("</head>", `<style>
            html { background: #e9e2d4; }
            body { margin: 48px auto; border-radius: 18px; border: 1px solid #d8cfc0;
                   box-shadow: 0 24px 60px rgba(27,24,21,.18); padding: 18px 16px; }
          </style></head>`);
        document.open();
        document.write(html);
        document.close();
      });
  </script>
</body>
</html>
