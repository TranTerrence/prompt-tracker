<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prompt Tracker</title>
  <link rel="stylesheet" href="onboarding.css" />
</head>
<body>
  <main>
    <header>
      <div class="mark"><img src="../icons/icon128.png" alt="Prompt Tracker" width="56" height="56" /></div>
      <h1 id="ob-title"></h1>
      <p class="subtitle" id="ob-subtitle"></p>
    </header>

    <p class="pitch" id="ob-pitch"></p>

    <section>
      <h2 id="ob-how"></h2>
      <ol class="steps">
        <li id="ob-step1"></li>
        <li id="ob-step2"></li>
        <li id="ob-step3"></li>
      </ol>
    </section>

    <!-- Divulgation bien visible (Chrome Web Store, User Data Privacy) :
         données, finalité, destination, conservation. Rien n'est capturé
         tant que le bouton d'accord en pied de page n'a pas été cliqué. -->
    <section class="card disclosure">
      <h2 id="ob-disc-title"></h2>
      <dl>
        <dt id="ob-disc-collect-title"></dt>
        <dd id="ob-disc-collect"></dd>
        <dt id="ob-disc-purpose-title"></dt>
        <dd id="ob-disc-purpose"></dd>
        <dt id="ob-disc-where-title"></dt>
        <dd id="ob-disc-where"></dd>
        <dt id="ob-disc-retention-title"></dt>
        <dd id="ob-disc-retention"></dd>
      </dl>
      <p><a id="ob-disc-policy" href="https://track-prompt.vercel.app/privacy" target="_blank" rel="noreferrer"></a></p>
    </section>

    <section class="card">
      <h2 id="ob-profile-title"></h2>
      <div class="theme-switch profile-switch" role="radiogroup">
        <button data-profile-choice="student"><span>🎓</span> <span id="profile-student"></span></button>
        <button data-profile-choice="consultant"><span>💼</span> <span id="profile-consultant"></span></button>
        <button data-profile-choice="employee"><span>🏢</span> <span id="profile-employee"></span></button>
        <button data-profile-choice="other"><span>✨</span> <span id="profile-other"></span></button>
      </div>
      <p class="hint" id="ob-profile-hint"></p>
    </section>

    <!-- Intention d'implémentation (Gollwitzer, d = 0.65) : le plan « si…,
         alors… » est rappelé tel quel dans la modale les premières semaines. -->
    <section class="card">
      <h2 id="ob-intention-title"></h2>
      <textarea id="setting-intention" rows="2"></textarea>
      <p class="hint" id="ob-intention-hint"></p>
    </section>

    <section class="row">
      <div class="card half">
        <h2 id="ob-theme-title"></h2>
        <div class="theme-switch" role="radiogroup">
          <button data-theme-choice="light"><span>☀️</span> <span id="theme-light"></span></button>
          <button data-theme-choice="dark"><span>🌙</span> <span id="theme-dark"></span></button>
          <button data-theme-choice="system"><span>◐</span> <span id="theme-system"></span></button>
        </div>
      </div>
      <div class="card half">
        <h2 id="ob-threshold-title"></h2>
        <label class="slider"><b id="threshold-value">40</b>/100
          <input type="range" id="setting-threshold" min="0" max="100" step="5" value="40" />
        </label>
        <p class="hint" id="ob-threshold-hint"></p>
      </div>
    </section>

    <footer>
      <p class="sites" id="ob-sites"></p>
      <button id="accept"></button>
      <p class="hint"><a href="#" id="later" class="later"></a></p>
      <p class="hint" id="ob-try" hidden></p>
    </footer>
  </main>

  <script src="../src/i18n.js"></script>
  <script src="onboarding.js"></script>
</body>
</html>
